#cloud-config
package_update: false
package_upgrade: false

write_files:
  # =========================
  # MAIN INSTALL SCRIPT (BASE64)
  # =========================
  - path: /root/setup-vm.sh
    permissions: '0755'
    encoding: b64
    content: |
      BASE64_CODE_CPANEL-SETUP.SH

  # =========================
  # FIRST LOGIN TRIGGER
  # =========================
  - path: /etc/profile.d/cpanel-first-login.sh
    permissions: '0755'
    content: |
      #!/bin/bash

      # =========================
      # ONLY ROOT + INTERACTIVE
      # =========================
      [ "$USER" != "root" ] && return
      [[ $- != *i* ]] && return

      # =========================
      # PREVENT RE-RUN
      # =========================
      if [ -f /root/.cpanel_installed ]; then
          return
      fi

      clear
      echo "======================================"
      echo "   CPANEL FIRST LOGIN INSTALLER"
      echo "======================================"
      echo ""
      echo "[INFO] Menjalankan installer..."
      echo ""

      # =========================
      # RUN INSTALLER
      # =========================
      bash /root/setup-vm.sh
      STATUS=$?

      if [ $STATUS -ne 0 ]; then
          echo "[ERROR] Installer gagal!"
          return
      fi


      # =========================
      # MARK AS DONE
      # =========================
      touch /root/.cpanel_installed

      # =========================
      # SELF DESTRUCT 🔥
      # =========================
      rm -f /root/setup-vm.sh
      rm -f /etc/profile.d/cpanel-first-login.sh

      echo ""
      echo "[INFO] Installation cpanel finished"
