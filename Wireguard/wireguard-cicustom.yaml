#cloud-config
package_update: false
package_upgrade: false

write_files:
  - path: /root/setup-vm.sh
    permissions: '0755'
    encoding: b64
    content: |
      BASE64_CODE_WIREGUARD-SETUP.SH

  - path: /etc/profile.d/wireguard-first-login.sh
    permissions: '0755'
    content: |
      #!/bin/bash

      [ "$USER" != "root" ] && return
      [ -f /root/.wireguard_installed ] && return

      clear
      echo "======================================"
      echo "      WIREGUARD FIRST LOGIN INSTALLER"
      echo "======================================"
      echo ""

      echo "[INFO] Menjalankan installer..."

      # 🚨 BLOCKING (WAJIB)
      bash /root/setup-vm.sh
      STATUS=$?

      if [ $STATUS -ne 0 ]; then
          echo "[ERROR] Installer gagal!"
          echo "[INFO] Cek log di /var/log/wireguard-install.log"
          return
      fi


      # ✅ MARK DONE (SETELAH BENAR2 SELESAI)
      touch /root/.wireguard_installed

      # ✅ CLEANUP DI AKHIR (INI YANG SEBELUMNYA SALAH POSISI)
      rm -f /root/setup-vm.sh
      rm -f /root/get-docker.sh
      rm -f /root/wireguard-installer.sh
      
      echo ""
      echo "[INFO] Installation WireGuard finished"
